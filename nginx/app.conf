# ─────────────────────────────────────────────────────────────────────────────
# Nginx reverse proxy config cho gce-zero2prod
#
# Cách dùng:
#   sudo cp nginx/app.conf /etc/nginx/sites-available/gce-zero2prod
#   sudo sed -i 's/YOUR_DOMAIN/your.domain.com/g' /etc/nginx/sites-available/gce-zero2prod
#   sudo ln -sf /etc/nginx/sites-available/gce-zero2prod /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Sau khi có Certbot cert, uncommment phần SSL bên dưới.
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP: redirect tất cả sang HTTPS ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_DOMAIN;

    # SSL certs từ Certbot (uncomment sau khi chạy certbot)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # ── Proxy → Node.js app ──────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (nếu sau này cần)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # Health check endpoint (bypass log noise)
    location /health {
        proxy_pass         http://127.0.0.1:3000/health;
        access_log         off;
    }
}
