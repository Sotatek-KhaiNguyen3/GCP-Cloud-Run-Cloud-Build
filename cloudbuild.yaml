# ─────────────────────────────────────────────────────────────────────────────
# Cloud Build CI/CD Pipeline
#
# Trigger: push to main branch
# SA cần có roles:
#   - roles/run.admin
#   - roles/iam.serviceAccountUser
#   - roles/artifactregistry.writer
#   - roles/cloudsql.client
#   - roles/secretmanager.secretAccessor
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _GAR_LOCATION:             asia-southeast1
  _GAR_REPOSITORY:           cloudrun-zero2prod
  _SERVICE_NAME:             cloudrun-zero2prod
  _REGION:                   asia-southeast1
  _CLOUDRUN_SA:              cloudrun-sa@${PROJECT_ID}.iam.gserviceaccount.com
  _INSTANCE_CONNECTION_NAME: ${PROJECT_ID}:asia-southeast1:cloudrun-zero2prod-db
  _DB_NAME:                  zero2prod
  _DB_USER:                  app_user

steps:
  # ── 1. Build Docker image ───────────────────────────────────────────────────
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - APP_VERSION=$TAG_NAME
      - --build-arg
      - BUILD_TIME=$BUILD_TIMESTAMP
      - --tag
      - ${_GAR_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_GAR_REPOSITORY}/app:$SHORT_SHA
      - --tag
      - ${_GAR_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_GAR_REPOSITORY}/app:latest
      - .

  # ── 2. Push → Artifact Registry ────────────────────────────────────────────
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_GAR_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_GAR_REPOSITORY}/app
    waitFor: [build]

  # ── 3. Deploy → Cloud Run ──────────────────────────────────────────────────
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_GAR_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_GAR_REPOSITORY}/app:$SHORT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --service-account
      - ${_CLOUDRUN_SA}
      - --add-cloudsql-instances
      - ${_INSTANCE_CONNECTION_NAME}
      - --set-env-vars
      - INSTANCE_CONNECTION_NAME=${_INSTANCE_CONNECTION_NAME},DB_NAME=${_DB_NAME},DB_USER=${_DB_USER}
      - --set-secrets
      - DB_PASSWORD=DB_PASSWORD:latest
      - --port
      - '8080'
    waitFor: [push]

  # ── 4. Ghi deployment record → Cloud SQL ───────────────────────────────────
  - id: record-deploy
    name: node:20-alpine
    entrypoint: sh
    args:
      - -c
      - npm ci --omit=dev && node scripts/record-deploy.js
    env:
      - INSTANCE_CONNECTION_NAME=${_INSTANCE_CONNECTION_NAME}
      - DB_NAME=${_DB_NAME}
      - DB_USER=${_DB_USER}
      - VERSION=$TAG_NAME
      - COMMIT_SHA=$SHORT_SHA
      - BUILD_TIME=$BUILD_TIMESTAMP
    secretEnv: [DB_PASSWORD]
    waitFor: [deploy]

# ── Secret Manager integration ─────────────────────────────────────────────
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DB_PASSWORD/versions/latest
      env: DB_PASSWORD

# ── Build config ──────────────────────────────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY

timeout: 600s
