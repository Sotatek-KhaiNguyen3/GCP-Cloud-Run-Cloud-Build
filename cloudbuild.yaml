steps:
  # ── 1. Read metadata from package.json ────────────────────────────────────
  - name: 'node:20-alpine'
    id: 'metadata'
    entrypoint: sh
    args:
      - -c
      - |
        # Ensure package.json exists and has a version field
        if [ ! -f package.json ]; then
          echo "Error: package.json not found."
          exit 1
        fi
        VERSION=$(node -p "require('./package.json').version")
        BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        echo "$$VERSION"    > /workspace/_version
        echo "$$BUILD_TIME" > /workspace/_build_time
        echo "Version  : $$VERSION"
        echo "BuildTime: $$BUILD_TIME"

  # ── 2. Build Docker image ──────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    entrypoint: sh
    args:
      - -c
      - |
        VERSION=$(cat /workspace/_version)
        BUILD_TIME=$(cat /workspace/_build_time)
        docker build \
          -t ${_GAR_HOST}/${PROJECT_ID}/${_REPO}/${_SERVICE}:$$VERSION \
          -t ${_GAR_HOST}/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest \
          --build-arg APP_VERSION=$$VERSION \
          --build-arg BUILD_TIME=$$BUILD_TIME \
          .

  # ── 3. Push to Artifact Registry ──────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    entrypoint: sh
    args:
      - -c
      - |
        VERSION=$(cat /workspace/_version)
        docker push ${_GAR_HOST}/${PROJECT_ID}/${_REPO}/${_SERVICE}:$$VERSION
        docker push ${_GAR_HOST}/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest

  # ── 4. Deploy to Cloud Run ────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: sh
    args:
      - -c
      - |
        VERSION=$(cat /workspace/_version)
        BUILD_TIME=$(cat /workspace/_build_time)
        gcloud run deploy ${_SERVICE} \
          --image=${_GAR_HOST}/${PROJECT_ID}/${_REPO}/${_SERVICE}:$$VERSION \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --service-account=${_CLOUDRUN_SA}@${PROJECT_ID}.iam.gserviceaccount.com \
          --set-env-vars=APP_NAME=${_SERVICE},APP_VERSION=$$VERSION,BUILD_TIME=$$BUILD_TIME \
          --set-secrets=ADMIN_PASSWORD=ADMIN_PASSWORD:latest \
          --min-instances=0 \
          --max-instances=3 \
          --memory=256Mi \
          --port=3000 \
          --labels=managed-by=cloudbuild
        URL=$(gcloud run services describe ${_SERVICE} \
          --region=${_REGION} \
          --format="value(status.url)")
        echo ""
        echo "  Deploy OK : $$URL"
        echo "  Version   : $$VERSION"
        echo "  Image     : ${_GAR_HOST}/${PROJECT_ID}/${_REPO}/${_SERVICE}:$$VERSION"

substitutions:
  _REGION: asia-southeast1             # Cloud Run and Artifact Registry region
  _REPO: gce-zero2prod                 # Artifact Registry repository name
  _SERVICE: zero2prod-webapp           # Cloud Run service name
  _GAR_HOST: asia-southeast1-docker.pkg.dev # Artifact Registry host for asia-southeast1
  _CLOUDRUN_SA: cloudrun-zero2prod-sa  # Cloud Run service account ID

options:
  logging: CLOUD_LOGGING_ONLY # Write logs to Cloud Logging only (no GCS bucket needed)
